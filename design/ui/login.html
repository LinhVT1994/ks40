<!DOCTYPE html>

<html class="dark" lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Đăng nhập - KS4.0 Academy</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3B82F6", // Blue-500
                        "background-light": "#f8fafc",
                        "background-dark": "#0a0a0a",
                        "accent-purple": "#8B5CF6", // Purple-500
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.5rem",
                    },
                    backgroundImage: {
                        'gradient-radial': 'radial-gradient(var(--tw-gradient-stops))',
                    }
                },
            },
        };
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .glass-panel {
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-white min-h-screen flex flex-col relative overflow-hidden">
<div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-full max-w-[1200px] pointer-events-none z-0">
<div class="absolute top-[-20%] left-[10%] w-[600px] h-[600px] bg-primary/20 rounded-full blur-[120px] mix-blend-screen"></div>
<div class="absolute top-[10%] right-[10%] w-[500px] h-[500px] bg-accent-purple/20 rounded-full blur-[120px] mix-blend-screen"></div>
</div>
<header class="w-full py-6 px-8 relative z-10 flex items-center justify-between">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded bg-gradient-to-br from-primary to-accent-purple flex items-center justify-center text-white font-bold text-lg">
<span class="material-icons text-[20px]">chevron_right</span>
</div>
<span class="font-semibold text-lg tracking-tight">KS4.0 Academy</span>
</div>
<nav class="hidden md:flex gap-6 text-sm font-medium text-slate-600 dark:text-slate-400">
<a class="hover:text-slate-900 dark:hover:text-white transition-colors" href="#">Trang chủ</a>
<a class="hover:text-slate-900 dark:hover:text-white transition-colors" href="#">Khóa học</a>
<a class="hover:text-slate-900 dark:hover:text-white transition-colors" href="#">Tài liệu</a>
</nav>
<div class="flex items-center gap-4 text-sm font-medium text-slate-600 dark:text-slate-400">
<a class="flex items-center gap-2 hover:text-slate-900 dark:hover:text-white transition-colors" href="#">
<span class="material-icons text-[18px]">chat_bubble_outline</span>
                Hỗ trợ
            </a>
</div>
</header>
<main class="flex-grow flex items-center justify-center p-6 relative z-10">
<div class="w-full max-w-md glass-panel rounded-2xl p-8 shadow-2xl">
<div class="text-center mb-8">
<h1 class="text-3xl font-bold mb-2 tracking-tight">Đăng nhập</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm">Truy cập vào hệ thống học tập của bạn</p>
</div>
<div class="flex flex-col gap-3 mb-6">
<button class="w-full flex items-center justify-center gap-3 px-4 py-2.5 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors">
<svg class="w-5 h-5" fill="none" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path>
</svg>
                    Tiếp tục với Google
                </button>
</div>
<div class="relative flex items-center py-5">
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
<span class="flex-shrink-0 mx-4 text-slate-400 text-xs">hoặc</span>
<div class="flex-grow border-t border-slate-200 dark:border-slate-800"></div>
</div>
<form class="space-y-4">
<div>
<label class="block text-sm font-medium mb-1.5 text-slate-700 dark:text-slate-300" for="email">Email hoặc Tên đăng nhập</label>
<input class="w-full bg-white/50 dark:bg-black/30 border border-slate-300 dark:border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" id="email" placeholder="developer@ks40.com" type="email"/>
</div>
<div>
<div class="flex justify-between items-center mb-1.5">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-300" for="password">Mật khẩu</label>
<a class="text-xs text-primary hover:text-primary/80 transition-colors" href="#">Quên mật khẩu?</a>
</div>
<input class="w-full bg-white/50 dark:bg-black/30 border border-slate-300 dark:border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-primary transition-all outline-none" id="password" placeholder="••••••••" type="password"/>
</div>
<button class="w-full bg-gradient-to-r from-primary to-accent-purple text-white font-medium rounded-lg px-4 py-2.5 text-sm hover:opacity-90 transition-opacity mt-6" type="button">
                    Đăng nhập
                </button>
</form>
<div class="mt-8 text-center text-sm text-slate-500 dark:text-slate-400">
                Chưa có tài khoản? <a class="text-primary hover:text-primary/80 font-medium transition-colors" href="#">Đăng ký ngay</a>
</div>
</div>
</main>
<footer class="w-full py-6 px-8 relative z-10 flex items-center justify-between border-t border-slate-200/10 dark:border-slate-800/50 mt-auto">
<div class="flex items-center gap-4 text-xs text-slate-500 dark:text-slate-400">
<span class="font-semibold text-slate-700 dark:text-slate-300">KS4.0 Academy</span>
<a class="hover:text-slate-900 dark:hover:text-white transition-colors" href="#">Điều khoản</a>
<span class="text-slate-700 dark:text-slate-600">|</span>
<a class="hover:text-slate-900 dark:hover:text-white transition-colors" href="#">Bảo mật</a>
</div>
<div class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400">
<span class="w-2 h-2 rounded-full bg-green-500"></span>
            Hệ thống đang hoạt động (v2.4.1)
        </div>
</footer>
</body></html>
